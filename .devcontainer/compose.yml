services:
  workspace:
    image: mcr.microsoft.com/devcontainers/base:resolute
    command: sleep infinity
    volumes:
      - ..:/home/vscode/workspaces/claims-intelligence-platform:cached
      - ./claude-config/data:/home/vscode/.claude
      - ./claude-config/.claude.json:/home/vscode/.claude.json
      - ./intellij:/home/vscode/.cache/JetBrains
    networks: [cip]
    depends_on:
      - postgres
      - redpanda
      - mongo
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: cip
      POSTGRES_PASSWORD: cip
    volumes:
      - ./init-postgres:/docker-entrypoint-initdb.d:ro
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks: [cip]

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --mode dev-container
      - --smp 1
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
    networks: [cip]

  redpanda-console:
    image: redpandadata/console:latest
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8085:8080"
    depends_on:
      - redpanda
    networks: [cip]

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks: [cip]

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks: [cip]

volumes:
  pg_data:
  mongo_data:

networks:
  cip:
